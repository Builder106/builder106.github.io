name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node.js 24 for every JavaScript action across all jobs (the
# default is being forced to 24 on 2026-06-02 anyway — bumping early
# silences the deprecation warnings and ensures we catch any Node 20→24
# incompatibility now rather than at the deadline).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # `prebuild` calls `gh api` to refresh public repo stats
          # (stars, language, last-push). The script falls back to the
          # committed JSON if the token is missing.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Post-deploy synthetic perf check. Runs Lighthouse 3× against the
  # live URL, averages the runs, uploads HTML + JSON reports to
  # temporary-public-storage (linked from the Action summary) and as
  # build artifacts. Assertions are all `warn`-level so a regression
  # doesn't block deploys — it just shows up in the run log + the
  # report link. Tighten to `error` once budgets stabilise.
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.outputs.url != ''
    steps:
      - uses: actions/checkout@v4
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy.outputs.url }}
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
