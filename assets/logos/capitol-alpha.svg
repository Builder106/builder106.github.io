<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="cap-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#06060c"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="244" height="244" rx="36" ry="36" fill="url(#cap-bg)" stroke="#cc0000" stroke-width="3"/>
  <!-- Ascending bar chart suggesting alpha. Heights climb left to right;
       last bar is the tallest + brightest to read as "edge". -->
  <g fill="#cc0000">
    <rect x="56"  y="156" width="22" height="50" rx="3"/>
    <rect x="92"  y="128" width="22" height="78" rx="3"/>
    <rect x="128" y="100" width="22" height="106" rx="3"/>
  </g>
  <rect x="164" y="58" width="22" height="148" rx="3" fill="#ff3333"/>
  <!-- Greek alpha glyph in the top-right corner, faint, as cluster tag. -->
  <text x="200" y="80" font-family="ui-monospace, Menlo, monospace"
        font-size="44" font-weight="700" fill="#cc0000" opacity="0.42"
        text-anchor="middle">α</text>
</svg>
