  <rect width="32" height="32" fill="#0a1019"/>
  <text x="16" y="25" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif"
        font-size="28" font-weight="700" text-anchor="middle" fill="#22c55e">α</text>
</svg>
