<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4cf2ff" />
      <stop offset="100%" stop-color="#e64cff" />
    </linearGradient>
  </defs>
  
  <!-- Base background (matches body background of your site) -->
  <rect width="100" height="100" rx="22" fill="#06060c" />
  
  <g stroke="url(#ossGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main base branch (vertical trunk) -->
    <line x1="32" y1="26" x2="32" y2="74" />
    <circle cx="32" cy="74" r="5" fill="#06060c" stroke-width="8" />
    
    <!-- PR feature branch curving off the base -->
    <path d="M 32 74 C 68 74, 68 50, 68 26" />
    <circle cx="68" cy="26" r="5" fill="#06060c" stroke-width="8" />
    
    <!-- Merge arrow pointing from PR branch back to base branch -->
    <line x1="68" y1="26" x2="32" y2="26" />
    <polyline points="46,14 32,26 46,38" />
  </g>
</svg>
